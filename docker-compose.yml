version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: rag_db
      POSTGRES_USER: rag
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rag"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    volumes:
      - qdrant_data:/qdrant/storage
    ports:
      - "6333:6333"
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    restart: unless-stopped

  rag:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - DATABASE_URL=postgresql://rag:${POSTGRES_PASSWORD}@postgres:5432/rag_db
      - QDRANT_HOST=qdrant
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - uploads_data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
      redis:
        condition: service_started
    restart: unless-stopped

  rag-worker:
    build: .
    command: ["python", "worker.py"]
    env_file: .env
    environment:
      - DATABASE_URL=postgresql://rag:${POSTGRES_PASSWORD}@postgres:5432/rag_db
      - QDRANT_HOST=qdrant
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - uploads_data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
      redis:
        condition: service_started
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - certbot_data:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    depends_on:
      - rag
    restart: unless-stopped

volumes:
  postgres_data:
  qdrant_data:
  redis_data:
  uploads_data:
  certbot_data:
  certbot_www:
