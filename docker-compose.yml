version: '3.8'
services:
  rag:
    image: ghcr.io/jemplayer82/rag:latest
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    environment:
      - RAG_ENV=production
    depends_on:
      - db
    restart: unless-stopped

  rag-worker:
    image: ghcr.io/jemplayer82/rag:latest
    volumes:
      - ./data:/app/data
    environment:
      - RAG_ENV=production
    restart: unless-stopped

  db:
    image: postgres:15
    environment:
      POSTGRES_USER: rag
      POSTGRES_PASSWORD: rag
      POSTGRES_DB: rag
    volumes:
      - ./db:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped

  nginx:
    image: nginx:latest
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./certbot_data:/etc/letsencrypt
      - ./certbot_www:/var/www/certbot
    depends_on:
      - rag
    restart: unless-stopped

  certbot:
    image: certbot/certbot:latest
    volumes:
      - ./certbot_data:/etc/letsencrypt
      - ./certbot_www:/var/www/certbot
    command: certbot certonly --standalone --agree-tos --email your@email.com -d yourdomain.com
    restart: unless-stopped