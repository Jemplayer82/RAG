name: Build and Deploy

on:
  push:
    branches: [master]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: jemplayer82/rag

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ env.IMAGE_NAME }}:latest
            ghcr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}

  deploy:
    needs: build-and-push
    runs-on: [self-hosted, webserver]

    steps:
      - name: Ensure data directories exist
        run: |
          DATA_ROOT="${DATA_ROOT:-/storage/rag}"
          mkdir -p "$DATA_ROOT"/{postgres,qdrant,redis,uploads,ollama}
          echo "Data dirs ready at $DATA_ROOT"

      - name: Deploy
        run: |
          cd /opt/rag
          git config --global --add safe.directory /opt/rag
          git pull
          # Use only the base compose file: the override (build: . / pull_policy:
          # build) is for local dev. On the VPS we must PULL the GHCR image, not
          # build it on the box.
          # Ensure all backing services are running (idempotent — skips healthy ones).
          docker compose -f docker-compose.yml up -d --no-recreate postgres qdrant redis ollama
          # Pull and hot-swap only the app containers with the new image.
          docker compose -f docker-compose.yml pull rag rag-worker
          docker compose -f docker-compose.yml up -d --no-deps rag rag-worker
          docker image prune -f
          echo "Deploy complete: $(date)"
