name: Recreate self-hosted runner
on:
  workflow_dispatch:
    inputs:
      runner_token:
        description: 'GitHub runner registration token (expires in 1h)'
        required: true
        type: string
jobs:
  recreate:
    runs-on: ubuntu-latest
    steps:
      - name: SSH and recreate runner
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: REG_TOKEN
          script: |
            docker rm -f github-runner 2>/dev/null || true
            docker run -d \
              --name github-runner \
              --restart unless-stopped \
              -e REPO_URL=https://github.com/${{ github.repository }} \
              -e RUNNER_TOKEN=$REG_TOKEN \
              -e RUNNER_NAME=webserver-runner-2 \
              -e LABELS=self-hosted \
              -e DISABLE_AUTO_UPDATE=true \
              -e RUNNER_WORKDIR=/tmp/runner/work \
              -v /var/run/docker.sock:/var/run/docker.sock \
              myoung34/github-runner:latest
            sleep 5
            docker ps | grep github-runner
        env:
          REG_TOKEN: ${{ inputs.runner_token }}
