name: Fix postgres password (one-shot)
on:
  workflow_dispatch:

jobs:
  fix:
    runs-on: [self-hosted]
    steps:
      - name: Reset rag user password to match secret
        run: |
          docker exec rag-postgres-1 psql -U rag -d rag_db \
            -c "ALTER USER rag WITH PASSWORD '$POSTGRES_PASSWORD';"
          echo "Password reset done"
        env:
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}

      - name: Restart rag containers so they pick up the fix
        run: |
          docker restart rag-rag-1 rag-rag-worker-1
          echo "Restarted"
