{% extends "base.html" %}

{% block title %}Settings - RAG Assistant{% endblock %}

{% block content %}
<div class="py-4" style="max-width: 700px;">
    <h2><i class="bi bi-gear"></i> Settings</h2>
    <p class="text-muted">Manage your account settings.</p>

    <!-- User Profile -->
    <div class="card mb-4">
        <div class="card-header bg-secondary text-white">
            <h5 class="mb-0"><i class="bi bi-person"></i> Account</h5>
        </div>
        <div class="card-body">
            <div class="mb-3">
                <label class="form-label">Username</label>
                <input type="text" class="form-control" id="usernameDisplay" readonly>
            </div>
            <div class="mb-3">
                <label for="emailInput" class="form-label">Email</label>
                <input type="email" class="form-control" id="emailInput">
            </div>
            <button class="btn btn-primary" id="saveProfileBtn">
                <i class="bi bi-check-lg"></i> Save Changes
            </button>
            <div id="profileStatus" class="mt-3" style="display: none;"></div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
// Check auth
if (!localStorage.getItem('rag_token')) window.location.href = '/login';

// ---- Load current settings on page load ----
async function init() {
    await loadSettings();
}

async function loadSettings() {
    try {
        const resp = await fetch('/api/settings', {
            headers: { 'Authorization': `Bearer ${localStorage.getItem('rag_token')}` }
        });
        
        if (resp.status === 401) {
            window.location.href = '/login';
            return;
        }
        
        const data = await resp.json();
        document.getElementById('usernameDisplay').value = data.username || '';
        document.getElementById('emailInput').value = data.email || '';
    } catch (err) {
        console.error('Error loading settings:', err);
    }
}

// ---- Save profile ----
document.getElementById('saveProfileBtn').addEventListener('click', async () => {
    const email = document.getElementById('emailInput').value.trim();

    try {
        const resp = await fetch('/api/settings', {
            method: 'POST',
            headers: { 
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${localStorage.getItem('rag_token')}`
            },
            body: JSON.stringify({ email })
        });
        
        if (resp.status === 401) {
            window.location.href = '/login';
            return;
        }
        
        const data = await resp.json();
        const el = document.getElementById('profileStatus');
        
        if (!resp.ok) {
            el.innerHTML = `<div class="alert alert-danger">Error: ${data.detail || 'Update failed'}</div>`;
        } else {
            el.innerHTML = `<div class="alert alert-success">✓ Profile updated successfully.</div>`;
        }
        el.style.display = 'block';

    } catch (err) {
        document.getElementById('profileStatus').innerHTML =
            `<div class="alert alert-danger">Error: ${err.message}</div>`;
        document.getElementById('profileStatus').style.display = 'block';
    }
});

init();
</script>
{% endblock %}
