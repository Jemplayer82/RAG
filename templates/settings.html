{% extends "base.html" %}
{% block title %}Settings — rag{% endblock %}

{% block content %}
<div class="rag-main rag-container--sm">

  <section class="fc-panel" style="margin-bottom:18px;">
    <span class="fc-panel__title">[ account ]</span>
    <div style="display:flex;flex-direction:column;gap:14px;">
      <div class="fc-field">
        <label class="fc-field__label" for="usernameDisplay">Username</label>
        <input class="fc-input" type="text" id="usernameDisplay" name="username"
               autocomplete="username" readonly style="opacity:.6;cursor:default;">
      </div>
      <div class="fc-field">
        <label class="fc-field__label" for="emailInput">Email</label>
        <input class="fc-input" type="email" id="emailInput" placeholder="captain@fathomworks.local">
      </div>
      <div style="display:flex;align-items:center;gap:12px;">
        <button class="fc-btn fc-btn--primary fc-btn--sm" id="saveProfileBtn">Save changes</button>
      </div>
    </div>
    <div id="profileStatus" style="display:none;margin-top:12px;"></div>
  </section>

</div>
{% endblock %}

{% block scripts %}
<script>
(async () => {
    const token = localStorage.getItem('rag_token');
    if (!token) { window.location.href = '/login'; return; }
    const resp = await fetch('/api/auth/me', { headers: { 'Authorization': `Bearer ${token}` } });
    if (!resp.ok) { window.location.href = '/login'; return; }
    const user = await resp.json();
    if (!user.is_admin) { window.location.href = '/'; }
})();

async function init() { await loadSettings(); }

async function loadSettings() {
    try {
        const resp = await fetch('/api/settings', {
            headers: { 'Authorization': `Bearer ${localStorage.getItem('rag_token')}` }
        });
        if (resp.status === 401) { window.location.href = '/login'; return; }
        const data = await resp.json();
        document.getElementById('usernameDisplay').value = data.username || '';
        document.getElementById('emailInput').value = data.email || '';
    } catch (err) { console.error('Error loading settings:', err); }
}

document.getElementById('saveProfileBtn').addEventListener('click', async () => {
    const email = document.getElementById('emailInput').value.trim();
    try {
        const resp = await fetch('/api/settings', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${localStorage.getItem('rag_token')}`
            },
            body: JSON.stringify({ email })
        });
        if (resp.status === 401) { window.location.href = '/login'; return; }
        const data = await resp.json();
        const el = document.getElementById('profileStatus');
        if (!resp.ok) {
            el.innerHTML = `<div class="alert alert-danger">! ${data.detail || 'Update failed'}</div>`;
        } else {
            el.innerHTML = `<div class="alert alert-success">&#10003; Profile updated successfully.</div>`;
        }
        el.style.display = 'block';
    } catch (err) {
        const el = document.getElementById('profileStatus');
        el.innerHTML = `<div class="alert alert-danger">! ${err.message}</div>`;
        el.style.display = 'block';
    }
});

init();
</script>
{% endblock %}
