<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}RAG Assistant{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
</head>
<body>
    <nav class="navbar navbar-dark bg-dark sticky-top">
        <div class="container-fluid">
            <a class="navbar-brand" href="/"><i class="bi bi-database"></i> RAG Assistant</a>
            <div class="d-flex gap-2 align-items-center">
                <a href="/" class="btn btn-sm btn-outline-light"><i class="bi bi-chat-dots"></i> Chat</a>
                <a href="/library" class="btn btn-sm btn-outline-light"><i class="bi bi-library"></i> Library</a>
                <a href="/upload" class="btn btn-sm btn-outline-light"><i class="bi bi-plus-square"></i> Add Sources</a>
                <a href="/settings" class="btn btn-sm btn-outline-light"><i class="bi bi-gear"></i> Settings</a>
                <span id="navUsername" class="text-white-50 small ms-2" style="display:none;"></span>
                <button id="logoutBtn" class="btn btn-sm btn-outline-warning" style="display:none;"><i class="bi bi-box-arrow-right"></i> Logout</button>
                <a id="loginNavBtn" href="/login" class="btn btn-sm btn-outline-light" style="display:none;"><i class="bi bi-box-arrow-in-right"></i> Login</a>
            </div>
        </div>
    </nav>
    <div class="container-fluid">{% block content %}{% endblock %}</div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    {% block scripts %}{% endblock %}
    <script>
    (async () => {
        const token = localStorage.getItem('rag_token');
        if (token) {
            try {
                const resp = await fetch('/api/auth/me', { headers: { 'Authorization': `Bearer ${token}` } });
                if (resp.ok) {
                    const user = await resp.json();
                    document.getElementById('navUsername').textContent = user.username;
                    document.getElementById('navUsername').style.display = 'inline';
                    document.getElementById('logoutBtn').style.display = 'inline';
                } else { localStorage.removeItem('rag_token'); document.getElementById('loginNavBtn').style.display = 'inline'; }
            } catch { document.getElementById('loginNavBtn').style.display = 'inline'; }
        } else { document.getElementById('loginNavBtn').style.display = 'inline'; }
        document.getElementById('logoutBtn').addEventListener('click', () => { localStorage.removeItem('rag_token'); window.location.href = '/login'; });
    })();
    </script>
</body>
</html>
