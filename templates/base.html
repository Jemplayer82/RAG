<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}RAG Assistant{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Cpath fill='%230d6efd' d='M4.318 2.687C5.234 2.271 6.536 2 8 2s2.766.27 3.682.687C12.644 3.125 13 3.627 13 4c0 .374-.356.875-1.318 1.313C10.766 5.729 9.464 6 8 6s-2.766-.27-3.682-.687C3.356 4.875 3 4.373 3 4c0-.374.356-.875 1.318-1.313ZM13 5.698V7c0 .374-.356.875-1.318 1.313C10.766 8.729 9.464 9 8 9s-2.766-.27-3.682-.687C3.356 7.875 3 7.373 3 7V5.698c.271.202.58.378.904.525C4.978 6.711 6.427 7 8 7s3.022-.289 4.096-.777A4.92 4.92 0 0 0 13 5.698ZM14 4c0-1.007-.875-1.755-1.904-2.223C11.022 1.289 9.573 1 8 1s-3.022.289-4.096.777C2.875 2.245 2 2.993 2 4v9c0 1.007.875 1.755 1.904 2.223C4.978 15.71 6.427 16 8 16s3.022-.289 4.096-.777C13.125 14.755 14 14.007 14 13V4Zm-1 4.698V10c0 .374-.356.875-1.318 1.313C10.766 11.729 9.464 12 8 12s-2.766-.27-3.682-.687C3.356 10.875 3 10.373 3 10V8.698c.271.202.58.378.904.525C4.978 9.71 6.427 10 8 10s3.022-.289 4.096-.777A4.92 4.92 0 0 0 13 8.698Zm0 3V13c0 .374-.356.875-1.318 1.313C10.766 14.729 9.464 15 8 15s-2.766-.27-3.682-.687C3.356 13.875 3 13.373 3 13v-1.302c.271.202.58.378.904.525C4.978 12.71 6.427 13 8 13s3.022-.289 4.096-.777c.324-.147.633-.323.904-.525Z'/%3E%3C/svg%3E">
</head>
<body>
    <nav class="navbar navbar-dark bg-dark sticky-top">
        <div class="container-fluid">
            <a class="navbar-brand" href="/"><i class="bi bi-database"></i> RAG Assistant</a>
            <div class="d-flex gap-2 align-items-center">
                <a href="/" class="btn btn-sm btn-outline-light"><i class="bi bi-chat-dots"></i> Chat</a>
                <a href="/library" class="btn btn-sm btn-outline-light"><i class="bi bi-library"></i> Library</a>
                <a id="uploadNavBtn" href="/upload" class="btn btn-sm btn-outline-light d-none"><i class="bi bi-plus-square"></i> Add Sources</a>
                <a id="settingsNavBtn" href="/settings" class="btn btn-sm btn-outline-light d-none"><i class="bi bi-gear"></i> Settings</a>
                <a id="adminNavBtn" href="/admin/llm-settings" class="btn btn-sm btn-outline-warning d-none"><i class="bi bi-cpu"></i> Admin</a>
                <span id="navUsername" class="text-white-50 small ms-2" style="display:none;"></span>
                <a id="loginNavBtn" href="/login" class="btn btn-sm btn-outline-light"><i class="bi bi-box-arrow-in-right"></i> Login</a>
                <a id="registerNavBtn" href="/register" class="btn btn-sm btn-outline-light"><i class="bi bi-person-plus"></i> Register</a>
                <button id="logoutBtn" class="btn btn-sm btn-outline-warning" style="display:none;"><i class="bi bi-box-arrow-right"></i> Logout</button>
            </div>
        </div>
    </nav>
    <div class="container-fluid">{% block content %}{% endblock %}</div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    {% block scripts %}{% endblock %}
    <script>
    (async () => {
        const token = localStorage.getItem('rag_token');
        if (token) {
            try {
                const resp = await fetch('/api/auth/me', { headers: { 'Authorization': `Bearer ${token}` } });
                if (resp.ok) {
                    const user = await resp.json();
                    document.getElementById('navUsername').textContent = user.username;
                    document.getElementById('navUsername').style.display = 'inline';
                    document.getElementById('logoutBtn').style.display = 'inline';
                    document.getElementById('loginNavBtn').style.display = 'none';
                    document.getElementById('registerNavBtn').style.display = 'none';
                    if (user.is_admin) {
                        document.getElementById('uploadNavBtn').classList.remove('d-none');
                        document.getElementById('settingsNavBtn').classList.remove('d-none');
                        document.getElementById('adminNavBtn').classList.remove('d-none');
                    }
                } else { localStorage.removeItem('rag_token'); }
            } catch { /* not logged in, no action needed */ }
        }
        document.getElementById('logoutBtn').addEventListener('click', () => { localStorage.removeItem('rag_token'); window.location.href = '/'; });
    })();
    </script>
</body>
</html>
