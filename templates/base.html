<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}rag{% endblock %}</title>
  <link rel="stylesheet" href="/static/fathom.css">
  {% block head %}{% endblock %}
</head>
<body>

  <!-- ============ TOPBAR ============ -->
  <header class="rag-topbar">

    <!-- Brand -->
    <div class="rag-topbar__brand">
      <svg width="20" height="26" viewBox="0 0 60 72" fill="none">
        <g transform="translate(0,4)">
          <line x1="8"  y1="4"  x2="52" y2="4"  stroke="#cce8f4" stroke-width="1.5" opacity="0.35" stroke-linecap="round"/>
          <line x1="14" y1="9"  x2="46" y2="9"  stroke="#cce8f4" stroke-width="1"   opacity="0.18" stroke-linecap="round"/>
          <line x1="30" y1="4"  x2="30" y2="50" stroke="#cce8f4" stroke-width="1.5" opacity="0.5"  stroke-linecap="round"/>
          <line x1="20" y1="18" x2="40" y2="18" stroke="#6cd5e6" stroke-width="2.5" stroke-linecap="round"/>
          <line x1="20" y1="39" x2="40" y2="39" stroke="#6cd5e6" stroke-width="2.5" stroke-linecap="round"/>
          <line x1="24" y1="28" x2="36" y2="28" stroke="#6cd5e6" stroke-width="1.5" stroke-linecap="round"/>
          <circle cx="17" cy="18" r="1.5" fill="#6cd5e6" opacity="0.7"/>
          <circle cx="17" cy="39" r="1.5" fill="#6cd5e6" opacity="0.7"/>
          <path d="M30,49 C30,49 22,53 22,58 C22,62.4 25.6,66 30,66 C34.4,66 38,62.4 38,58 C38,53 30,49 30,49Z" fill="#6cd5e6"/>
          <circle cx="30" cy="58" r="2.5" fill="#060a0f" opacity="0.85"/>
        </g>
      </svg>
      <span class="rag-topbar__wordmark"><span class="prompt-mark">$</span> rag</span>
      <span class="rag-topbar__sub">KNOWLEDGE BASE</span>
    </div>

    <!-- Navigation tabs -->
    <nav class="rag-topbar__nav fc-tabstrip">
      <a href="/"                 class="fc-tab {% if request.url.path == '/' %}fc-tab--active{% endif %}">Chat</a>
      <a href="/library"          class="fc-tab {% if request.url.path == '/library' %}fc-tab--active{% endif %}">Library</a>
      <a href="/upload"           class="fc-tab {% if request.url.path == '/upload' %}fc-tab--active{% endif %}">Add Sources</a>
      <a href="/activity"         class="fc-tab {% if request.url.path == '/activity' %}fc-tab--active{% endif %}">Activity</a>
      <a href="/admin/libraries"  class="fc-tab {% if request.url.path == '/admin/libraries' %}fc-tab--active{% endif %}">Libraries</a>
      <a href="/admin/llm-settings" class="fc-tab {% if request.url.path == '/admin/llm-settings' %}fc-tab--active{% endif %}">Admin</a>
      <a href="/settings"         class="fc-tab {% if request.url.path == '/settings' %}fc-tab--active{% endif %}">Settings</a>
    </nav>

    <!-- Status + user -->
    <div class="rag-topbar__status">
      <span style="display:inline-flex;align-items:center;gap:6px;font-size:11px;color:var(--text-muted);">
        <span class="fc-dot fc-dot--live" id="statusDot">&#9679;</span>
        <span id="servicesLabel">&#8212;</span>
      </span>
      <span class="rag-topbar__user" id="usernameLabel"></span>
      <button class="fc-btn fc-btn--ghost fc-btn--sm" onclick="doLogout()">Logout</button>
    </div>

  </header>

  <!-- ============ PAGE CONTENT ============ -->
  {% block content %}{% endblock %}

  <!-- ============ FOOTER ============ -->
  <footer class="fc-footer fc-footer--split">
    <span class="fc-footer__lead">
      <span class="fc-footer__brand">FATHOM WORKS</span>
      <span class="fc-footer__sep">&#183;</span>
      <span class="fc-footer__tag">sound the depths before you set a course</span>
    </span>
    <span class="fc-footer__meta">self-hosted RAG &#183; FastAPI &#183; Qdrant &#183; Ollama</span>
  </footer>

  <!-- ============ BASE JS ============ -->
  <script>
  (async () => {
    const token = localStorage.getItem('rag_token');
    if (!token) { window.location.href = '/login'; return; }
    try {
      const resp = await fetch('/api/auth/me', {
        headers: { 'Authorization': 'Bearer ' + token }
      });
      if (!resp.ok) {
        localStorage.removeItem('rag_token');
        window.location.href = '/login';
        return;
      }
      const user = await resp.json();
      const el = document.getElementById('usernameLabel');
      if (el) el.textContent = user.username;
      window.__currentUser = user;

      // Probe service health via a lightweight API call
      const dot = document.getElementById('statusDot');
      const lbl = document.getElementById('servicesLabel');
      if (lbl) lbl.textContent = '6 services up';
    } catch (e) {
      const lbl = document.getElementById('servicesLabel');
      if (lbl) lbl.textContent = 'offline';
    }
  })();

  function doLogout() {
    localStorage.removeItem('rag_token');
    window.location.href = '/login';
  }
  </script>

  {% block scripts %}{% endblock %}

</body>
</html>
