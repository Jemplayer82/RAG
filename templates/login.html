<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — rag</title>
  <link rel="stylesheet" href="/static/fathom.css">
</head>
<body style="margin:0;padding:0;">

<div class="rag-auth-page">

  <!-- Ambient sonar rings -->
  <div class="rag-auth-rings">
    <div class="rag-auth-ring"></div>
    <div class="rag-auth-ring"></div>
    <div class="rag-auth-ring"></div>
  </div>
  <!-- Depth grid -->
  <div class="rag-auth-grid"></div>

  <!-- Centered column -->
  <div class="rag-auth-inner">

    <!-- Brand -->
    <div class="rag-auth-brand">
      <svg width="38" height="48" viewBox="0 0 60 72" fill="none">
        <g transform="translate(0,4)">
          <line x1="8"  y1="4"  x2="52" y2="4"  stroke="#cce8f4" stroke-width="1.5" opacity="0.35" stroke-linecap="round"/>
          <line x1="14" y1="9"  x2="46" y2="9"  stroke="#cce8f4" stroke-width="1"   opacity="0.18" stroke-linecap="round"/>
          <line x1="30" y1="4"  x2="30" y2="50" stroke="#cce8f4" stroke-width="1.5" opacity="0.5"  stroke-linecap="round"/>
          <line x1="20" y1="18" x2="40" y2="18" stroke="#6cd5e6" stroke-width="2.5" stroke-linecap="round"/>
          <line x1="20" y1="39" x2="40" y2="39" stroke="#6cd5e6" stroke-width="2.5" stroke-linecap="round"/>
          <line x1="24" y1="28" x2="36" y2="28" stroke="#6cd5e6" stroke-width="1.5" stroke-linecap="round"/>
          <circle cx="17" cy="18" r="1.5" fill="#6cd5e6" opacity="0.7"/>
          <circle cx="17" cy="39" r="1.5" fill="#6cd5e6" opacity="0.7"/>
          <path d="M30,49 C30,49 22,53 22,58 C22,62.4 25.6,66 30,66 C34.4,66 38,62.4 38,58 C38,53 30,49 30,49Z" fill="#6cd5e6"/>
          <circle cx="30" cy="58" r="2.5" fill="#060a0f" opacity="0.85"/>
        </g>
      </svg>
      <div class="rag-auth-headline">
        <span class="prompt-mark">$</span> <span style="color:#eaf3fa;">rag</span>
      </div>
      <div class="rag-auth-sub">SELF-HOSTED KNOWLEDGE BASE</div>
    </div>

    <!-- Login panel -->
    <div class="fc-panel" style="width:100%;">
      <span class="fc-panel__title">[ login ]</span>

      <form id="loginForm">
        <div class="fc-field" style="margin-bottom:13px;">
          <label class="fc-field__label" for="username">Username</label>
          <input class="fc-input" type="text" id="username" name="username"
                 placeholder="captain" autocomplete="username" required autofocus>
        </div>
        <div class="fc-field" style="margin-bottom:18px;">
          <label class="fc-field__label" for="password">Password</label>
          <input class="fc-input" type="password" id="password" name="password"
                 placeholder="enter password" autocomplete="current-password" required>
        </div>
        <button type="submit" class="fc-btn fc-btn--primary w-100">Login</button>
      </form>

      <div id="loginError" class="rag-alert rag-alert--danger d-none"></div>

      <div style="border-top:1px solid var(--line);margin-top:18px;padding-top:14px;text-align:center;font-size:12px;color:var(--text-muted);">
        No account? <a href="/register" style="color:var(--sonar);">Register &#8594;</a>
      </div>
    </div>

  </div>
</div>

<script>
document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const username = document.getElementById('username').value;
  const password = document.getElementById('password').value;
  const errEl = document.getElementById('loginError');
  errEl.classList.add('d-none');

  const formData = new URLSearchParams();
  formData.append('username', username);
  formData.append('password', password);

  const resp = await fetch('/api/auth/login', {
    method: 'POST',
    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
    body: formData
  });

  if (resp.ok) {
    const data = await resp.json();
    localStorage.setItem('rag_token', data.access_token);
    window.location.href = '/';
  } else {
    const err = await resp.json();
    errEl.textContent = '! ' + (err.detail || 'Login failed');
    errEl.classList.remove('d-none');
  }
});
</script>

</body>
</html>
